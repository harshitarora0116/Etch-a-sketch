<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="title">ETCH-A-SKETCH!</div>
    <div class="drawing-area">
        <div class="buttons" style="display: flex; flex-direction:column;">
            <button class="brush">BRUSH</button>
            <button class="eraser">ERASER</button>
            <button class="clear">CLEAR</button>
            <button class="color-button"> COLOR🎨</button>
            <input type="color" class="color-picker" value="#000000" style="display:none; position:absolute; visibility: hidden;">
        </div>
        <div class="canvas"></div>
        <div class="sketches"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
