<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="padding: 0px 80px; display:flex; justify-content: center;"><div class="title">ETCH-A-SKETCH!</div></div>
    <div class="drawing-area" style="padding:40px 10px;">
        <div class="buttons" style="display: flex; flex-direction:column;">
            <button class="brush button">BRUSH</button>
            <button class="eraser button">ERASER</button>
            <button class="clear button">CLEAR</button>
            <button class="color-button button" style="position:relative;"> COLOR🎨
                <input type="color" class="color-picker button" value="#000000" style="position:absolute; opacity: 0;">
            </button>
        </div>
        <div class="canvas"></div>
        <div class="sketches"></div>
    </div>
    <div class="footer" style="display: flex; justify-content: center; gap: 50px;">
        <button class="size button">SIZE</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
